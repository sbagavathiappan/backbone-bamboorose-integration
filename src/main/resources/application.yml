server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: backbone-bamboorose-integration

  datasource:
    url: jdbc:h2:mem:webhookdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

webhook:
  security:
    webhook-secret: ${WEBHOOK_SECRET:change-this-in-production}
  bkbn:
    base-url: ${BKBN_BASE_URL:https://sync.bkbn.com}
    client-id: ${BKBN_CLIENT_ID:your-client-id}
    client-secret: ${BKBN_CLIENT_SECRET:your-client-secret}
    jwt-token: ${BKBN_JWT_TOKEN:}
  bamboorose:
    base-url: ${BAMBOO_ROSE_URL:https://api.bamboorose.com}
    api-key: ${BAMBOO_ROSE_API_KEY:your-api-key}
    api-secret: ${BAMBOO_ROSE_API_SECRET:your-api-secret}

async:
  executor:
    core-pool-size: 5
    max-pool-size: 20
    queue-capacity: 500
    thread-name-prefix: webhook-sync-

resilience4j:
  retry:
    instances:
      bkbn:
        max-attempts: 3
        wait-duration: 1s
        retry-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
      bamboorose:
        max-attempts: 3
        wait-duration: 1s
        retry-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
  circuitbreaker:
    instances:
      bkbn:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
      bamboorose:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
  timelimiter:
    instances:
      bkbn:
        timeout-duration: 10s
        cancel-running-future: true
      bamboorose:
        timeout-duration: 10s
        cancel-running-future: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    root: INFO
    com.backbonebamboorose: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
